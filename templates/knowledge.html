<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg+xml"
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="0.9em" font-size="90">💋</text></svg>'>
</head>

<body>
    <div class="wrap">
        <header class="topbar">
            <div class="topbar-row">
                <img class="topbar-banner" src="{{ url_for('static', filename='banner.png') }}" alt="ChuっとRagコンバーター" />

                <div class="topbar-actions">
                    <div class="modeBtns">
                        <a class="modeBtn" href="/">手動</a>
                        <a class="modeBtn" href="/auto">自動</a>
                        <a class="modeBtn active" href="/knowledge">ナレッジ</a>
                    </div>
                    <div class="model-pill">{{ model_label }}</div>
                </div>
            </div>
        </header>

        <main class="grid">
            <section class="card full">
                <div class="kbar">
                    <span class="kbarLabel">ナレッジ</span>
                    <select id="dataset" class="kbarSelect"></select>

                    <button id="reloadDatasetsBtn" type="button">再読込</button>

                    <span class="kbarLabel">フィルタ</span>
                    <input id="docKeyword" class="kbarInput" type="text" placeholder="例: 202603 / spec / manual" />

                    <button id="refreshBtn" class="primary" type="button">状況を更新</button>
                    <button id="clearBtn" type="button">クリア</button>
                </div>

                <div class="kbarSub">
                    <span id="docsSummary">-</span>
                    <span class="kbarSep">/</span>
                    <span id="docsHint">-</span>
                </div>
            </section>

            <section class="card full">
                <div class="tableWrapFull">
                    <table class="kTable kTableSmall">
                        <thead>
                            <tr>
                                <th style="width:44%;">ファイル名</th>
                                <th style="width:14%;">単語数</th>
                                <th style="width:12%;">検索回数</th>
                                <th style="width:20%;">アップロード時間</th>
                                <th style="width:10%;">ステータス</th>
                            </tr>
                        </thead>
                        <tbody id="docsTbody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="segModal" class="modalOverlay" aria-hidden="true">
        <div class="modalCard modalWide" role="dialog" aria-modal="true" aria-labelledby="segTitle">
            <div class="modalHead">
                <div id="segTitle" class="modalTitle">Chunks</div>
                <button id="segClose" class="modalClose" type="button" aria-label="閉じる">×</button>
            </div>

            <div class="modalBody normal">
                <div class="segBar">
                    <span class="segLabel">keyword</span>
                    <input id="segKeyword" type="text" placeholder="検索（チャンク本文）" />
                    <span class="segLabel">status</span>
                    <select id="segStatus">
                        <option value="">all</option>
                        <option value="completed">completed</option>
                        <option value="indexing">indexing</option>
                        <option value="error">error</option>
                    </select>
                    <button id="segSearchBtn" class="primary" type="button">検索</button>
                    <button id="segPrevBtn" type="button">前へ</button>
                    <button id="segNextBtn" type="button">次へ</button>
                    <span id="segPageInfo" class="segInfo">-</span>
                    <span id="segTotalInfo" class="segInfo">-</span>
                </div>

                <div class="tableWrap">
                    <table class="kTable kTableSmall">
                        <thead>
                            <tr>
                                <th style="width:18%;">chunk_id</th>
                                <th style="width:10%;">index</th>
                                <th style="width:12%;">tokens</th>
                                <th>preview</th>
                            </tr>
                        </thead>
                        <tbody id="segTbody"></tbody>
                    </table>
                </div>

                <div id="segDetail" class="segDetail mono"></div>
            </div>

            <div class="modalFoot">
                <button id="segOk" class="primary" type="button">閉じる</button>
            </div>
        </div>
    </div>

    <div id="noticeModal" class="modalOverlay" aria-hidden="true">
        <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="noticeTitle">
            <div class="modalHead">
                <div id="noticeTitle" class="modalTitle">NOTICE</div>
                <button id="noticeClose" class="modalClose" type="button" aria-label="閉じる">×</button>
            </div>
            <div id="noticeBody" class="modalBody mono"></div>
            <div class="modalFoot">
                <button id="noticeOk" class="primary" type="button">閉じる</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='knowledge.js') }}"></script>
</body>

</html>
